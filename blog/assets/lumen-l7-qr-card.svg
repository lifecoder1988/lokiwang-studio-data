  </linearGradient>
  <radialGradient id="halo" cx="0.5" cy="0.4" r="0.6">
   <stop offset="0" stop-color="#153039" stop-opacity="0.85"/><stop offset="1" stop-color="#05070a" stop-opacity="0"/>
